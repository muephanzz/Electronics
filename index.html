<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/favicon.ico">
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div id="search-container">
            <input type="text" id="search-bar" placeholder="Search for products..." oninput="searchProducts(this.value)">
            <div class="search-button">
                <i class="search-icon fa fa-search"></i>
            </div>
        </div>
    </header>

    <!-- Product List Section -->
    <div id="product-list" class="product-list">
        <!-- Example Product -->
        <div class="product">
            <div class="product-image">
                <img src="images/samsungA05s.webp" alt="Samsung A05s">
            </div>
            <h3>Samsung A05s</h3>
            <p>4GB RAM, 64GB Storage</p>
            <div class="price">$799</div>
            <a href="products.html?id=1" class="details-link">View Details</a>
        </div>

        <div class="product">
            <div class="product-image">
                <img src="images/samsungA25.png" alt="Samsung A25">
            </div>
            <h3>Samsung A25</h3>
            <p>128GB Storage, 6GB RAM</p>
            <div class="price">$799</div>
            <a href="products.html?id=2" class="details-link">View Details</a>
        </div>

        <div class="product">
            <div class="product-image">
                <img src="images/samsungA05.png" alt="Samsung A05">
            </div>
            <h3>Samsung A05</h3>
            <p>4GB RAM, 64GB Storage</p>
            <div class="price">$799</div>
            <a href="products.html?id=3" class="details-link">View Details</a>
        </div>

        <div class="product">
            <div class="product-image">
                <img src="images/oppoA18.webp" alt="Oppo A18">
            </div>
            <h3>Oppo A18</h3>
            <p>4GB + 128GB, 5000mAh Battery</p>
            <div class="price">$799</div>
            <a href="products.html?id=4" class="details-link">View Details</a>
        </div>

        <!-- More products can be added here in the same format -->
    </div>

    <!-- Bottom Icons Section -->
    <div class="bottom-icons">
        <a href="#home">
            <i class="fa fa-home"></i>
            <div>Home</div>
        </a>
        <a href="#category">
            <i class="fa fa-list"></i>
            <div>Category</div>
        </a>
        <a href="#cart">
            <i class="fa fa-shopping-cart"></i>
            <div>Cart</div>
        </a>
        <a href="#contact">
            <i class="fa fa-phone"></i>
            <div>Contact</div>
        </a>
    </div>

    <!-- JavaScript -->
    <script>
        function searchProducts(query) {
            const products = document.querySelectorAll('.product');
            products.forEach(product => {
                const name = product.querySelector('h3').textContent.toLowerCase();
                if (name.includes(query.toLowerCase())) {
                    product.style.display = 'block';
                } else {
                    product.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>

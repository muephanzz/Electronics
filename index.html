<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ephantus Electronics - Quality Electronics at Affordable Prices">
    <title>Ephantus Electronics (EE)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header>
        <h1>Ephantus Electronics (EE)</h1>
        <div class="top-icons">
            <div id="cart-icon">🛒<span id="cart-count">0</span></div>
            <div id="menu-icon" onclick="toggleMenu()">☰</div>
        </div>
    </header>

    <!-- Menu -->
    <div id="menu-items">
        <ul>
            <li>Home</li>
            <li onclick="showCategories()">Category</li>
            <li>About Us</li>
            <li>Contact</li>
        </ul>
    </div>

    <!-- Category Dropdown -->
    <div id="categories-dropdown">
        <ul>
            <li onclick="showCategory('smartphones')">Smartphones</li>
            <li onclick="showCategory('laptops')">Laptops & Computers</li>
            <li onclick="showCategory('tablets')">Tablets</li>
            <li onclick="showCategory('headphones')">Headphones & Airpods</li>
            <li onclick="showCategory('smarthome')">Smart Home Devices</li>
            <li onclick="showCategory('tv')">Television & Home Entertainment</li>
            <li onclick="showCategory('peripherals')">Computer Peripherals</li>
        </ul>
    </div>

    <!-- Search Bar -->
    <div id="search-bar">
        <input type="text" placeholder="Search products..." oninput="searchProducts(this.value)">
    </div>

    <!-- Product List -->
    <div id="product-list"></div>

    <!-- Product Modal -->
    <div id="product-modal">
        <div class="modal-content">
            <span onclick="closeModal()" class="close-btn">&times;</span>
            <h2 id="product-title"></h2>
            <img id="product-image" alt="Product Image">
            <p id="product-description"></p>
            <div id="product-price"></div>
            <label for="color">Color:</label>
            <select id="color">
                <option>Black</option>
                <option>White</option>
                <option>Blue</option>
            </select>
            <label for="storage">Storage:</label>
            <select id="storage">
                <option>64GB</option>
                <option>128GB</option>
                <option>256GB</option>
            </select>
            <label for="quantity">Quantity:</label>
            <input type="number" id="quantity" min="1" value="1">
            <button onclick="addToCart()">Add to Cart</button>
            <button onclick="buyNow()">Buy Now</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

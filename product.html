<!DOCTYPE html>

    <meta name="description" content="Product Details - Ephantus Electronics">

    <!-- Header -->

        <h1>Ephantus Electronics</h1>
        <a href="index.html" class="back-link">Back to Home</a>

    <!-- Product Details Section -->
    <section id="product-details" class="product-details">
        <div class="product-image">
            <img id="product-img" src="" alt="Product Image">
        </div>
        <div class="product-info">
            <h2 id="product-name">Product Name</h2>
            <p id="product-description">Product description goes here...</p>
            <div class="product-price" id="product-price">$0.00</div>

            <div class="product-options">
                <label for="color">Color:</label>
                <select id="color">
                    <option>Black</option>
                    <option>White</option>
                    <option>Blue</option>
                </select>

                <label for="storage">Storage:</label>
                <select id="storage">
                    <option>64GB</option>
                    <option>128GB</option>
                    <option>256GB</option>
                </select>

                <label for="quantity">Quantity:</label>
                <input type="number" id="quantity" min="1" value="1">
            </div>

            <div class="purchase-buttons">
                <button onclick="addToCart()">Add to Cart</button>
                <button onclick="buyNow()">Buy Now</button>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2024 Ephantus Electronics. All rights reserved.</p>
    </footer>

        // Function to load product details based on the ID from URL
        function loadProductDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            const product = products.find(p => p.id === productId);
            if (product) {
                document.getElementById("product-name").textContent = product.name;
                document.getElementById("product-description").textContent = product.description;
                document.getElementById("product-price").textContent = product.price;
                document.getElementById("product-img").src = product.image;
                document.getElementById("product-img").alt = product.name;
            } else {
                document.getElementById("product-details").innerHTML = "<p>Product not found.</p>";
            }
        }

        // Call function to load product details on page load
        window.onload = loadProductDetails;

        function addToCart() {

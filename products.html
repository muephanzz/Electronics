<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="stylep.css">
    <link rel="icon" href="images/favicon.ico">
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
</head>
<body>
    <!-- Header -->
    <header>
        <div id="search-container">
            <input type="text" id="search-bar" placeholder="Search for products..." oninput="searchProducts(this.value)">
            <div class="search-button">
                <i class="search-icon fa fa-search"></i>
            </div>
        </div>
    </header>

    <!-- Product Details Section -->
    <div id="product-details" class="product-details">
        <div class="product-image">
            <img src="images/samsungA05s.webp" alt="Samsung A05s">
        </div>

        <div class="product-info">
            <h1>Samsung A05s</h1>
            <p class="product-description">4GB RAM, 64GB Storage. The Samsung A05s comes with a high-resolution camera, long battery life, and a fast processor to handle all your daily tasks with ease.</p>
            <div class="price">$799</div>
            <button class="add-to-cart">Add to Cart</button>
            <a href="index.html" class="back-to-home">Back to Home</a>
        </div>
    </div>

    <script>
        // Search functionality remains unchanged
        function searchProducts(query) {
            const products = document.querySelectorAll('.product');
            products.forEach(product => {
                const name = product.querySelector('h3')?.textContent?.toLowerCase();
                if (name?.includes(query.toLowerCase())) {
                    product.style.display = 'block';
                } else {
                    product.style.display = 'none';
                }
            });
        }
    </script>
</body>
</html>
